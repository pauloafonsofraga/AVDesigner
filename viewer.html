<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AV Designer Viewer</title>
  <link rel="icon" href="VideoCoreLogo.png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #11161b;
      --panel: #20262d;
      --line: #33404d;
      --text: #edf2f7;
      --muted: #a7b2c1;
      --blue: #32b6ff;
      --orange: #fb7904;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .viewer-card {
      width: min(460px, 100%);
      display: grid;
      gap: 16px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .32);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #111820;
      color: var(--text);
      font: inherit;
      font-weight: 700;
    }

    input:focus {
      border-color: var(--blue);
      outline: 2px solid rgba(50, 182, 255, .18);
    }

    button {
      min-height: 42px;
      border: 1px solid var(--blue);
      border-radius: 7px;
      background: var(--blue);
      color: #061018;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: .72;
    }

    .status {
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--blue);
    }
  </style>
</head>
<body>
  <main class="viewer-card">
    <div class="brand">
      <img src="VideoCoreLogo.png" alt="Video Core">
      <div>
        <h1>AV Designer Viewer</h1>
        <p>Read-only hosted wirechart</p>
      </div>
    </div>
    <p>Enter the project password to open the technician viewer.</p>
    <form id="unlockForm">
      <label>
        Viewer Password
        <input id="projectPassword" type="password" autocomplete="current-password" required>
      </label>
      <div class="status" id="viewerStatus"></div>
      <button id="unlockButton" type="submit">Open Viewer</button>
    </form>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const pathMatch = location.pathname.match(/\/v\/([^/?#]+)/);
    const projectId = params.get("id") || (pathMatch ? decodeURIComponent(pathMatch[1]) : "");
    const form = document.getElementById("unlockForm");
    const passwordInput = document.getElementById("projectPassword");
    const statusEl = document.getElementById("viewerStatus");
    const button = document.getElementById("unlockButton");

    function setStatus(message, mode = "") {
      statusEl.textContent = message || "";
      statusEl.className = "status" + (mode ? " " + mode : "");
    }

    if (!projectId) {
      setStatus("This viewer link is missing a project id.", "error");
      passwordInput.disabled = true;
      button.disabled = true;
    }

    function hostedViewerCss() {
      return `:root{color-scheme:light;--bg:#edf2f7;--grid-bg:#f5f8fb;--panel:#ffffff;--panel-strong:#f8fafc;--line:#c8d1dc;--line-strong:#8e9aa8;--text:#17202a;--muted:#5d6876;--blue:#32b6ff;--orange:#fb7904;--danger:#e5484d}body.dark-mode{color-scheme:dark;--bg:#11161b;--grid-bg:#11161b;--panel:#20262d;--panel-strong:#26313d;--line:#33404d;--line-strong:#526171;--text:#edf2f7;--muted:#a7b2c1}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}button,input{font:inherit}.topbar{position:fixed;top:0;left:0;right:0;z-index:20;border-bottom:1px solid var(--line);background:var(--panel);box-shadow:0 8px 22px rgba(0,0,0,.16)}.topbar-main{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:60px;padding:10px 18px}.brand{min-width:0}.project-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:18px;font-weight:900;line-height:1.15}.danger-note{margin-top:2px;color:var(--muted);font-size:12px;font-weight:800}.topbar-toggle{display:none}.topbar-drawer{display:flex;align-items:center;gap:14px;padding:0 18px 10px}.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.tool-button,.topbar-toggle,.inspector-toggle{min-height:36px;padding:0 13px;border:1px solid var(--line-strong);border-radius:8px;background:var(--panel);color:var(--text);font-weight:900;cursor:pointer}.tool-button:hover,.topbar-toggle:hover,.inspector-toggle:hover{border-color:var(--blue);box-shadow:0 0 0 2px rgba(50,182,255,.14)}.zoom-readout{min-width:48px;text-align:center;color:var(--muted);font-size:13px;font-weight:800}.status{flex:1 1 230px;min-width:160px;color:var(--muted);font-size:13px;font-weight:800}.legend{display:flex;align-items:center;gap:12px;min-width:0;overflow:auto;color:var(--muted);font-size:12px;font-weight:900}.legend-item{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}.legend-swatch{width:28px;height:4px;border-radius:999px;background:currentColor}.layout{position:fixed;top:104px;left:0;right:0;bottom:0;display:grid;grid-template-columns:minmax(0,1fr)340px;background:var(--grid-bg)}.stage{position:relative;min-width:0;min-height:0;overflow:hidden}.stage svg{display:block;width:100%;height:100%;background:var(--grid-bg);touch-action:none}.stage svg.panning{cursor:grabbing}.inspector{position:relative;min-width:0;overflow:auto;border-left:1px solid var(--line);background:var(--panel);color:var(--text);transition:transform .18s ease,margin-right .18s ease}.inspector-head{position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:18px 18px 10px;background:var(--panel)}.inspector h1{margin:0;font-size:18px}.inspector-toggle{position:absolute;top:50%;left:-42px;width:42px;height:72px;min-height:0;padding:0;border-right:0;border-radius:12px 0 0 12px;background:var(--panel);color:var(--blue);font-size:24px}.placeholder{padding:0 18px 18px;color:var(--muted);font-size:16px;line-height:1.45}.info-card{margin:0 18px 14px;padding:12px;border:1px solid var(--line);border-radius:8px;background:var(--panel-strong)}.info-row{display:grid;grid-template-columns:96px minmax(0,1fr);gap:10px;padding:5px 0;color:var(--muted);font-size:12px;font-weight:900}.info-row strong{color:var(--text);overflow-wrap:anywhere}.inspector-actions{display:grid;gap:8px;margin:12px 18px}.report-backdrop{position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:18px;background:rgba(0,0,0,.48)}.report-backdrop.hidden{display:none}.report-dialog{width:min(960px,100%);max-height:86vh;display:grid;grid-template-rows:auto minmax(0,1fr);border:1px solid var(--line);border-radius:10px;background:var(--panel);box-shadow:0 24px 100px rgba(0,0,0,.38)}.report-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}.report-head h2{margin:0}.report-body{overflow:auto;padding:16px}.report-body h3{margin:18px 0 8px}.report-body table{width:100%;border-collapse:collapse}.report-body th,.report-body td{padding:7px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:12px}.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}.summary-card{padding:10px;border:1px solid var(--line);border-radius:8px;background:var(--panel-strong)}.summary-card strong{display:block;font-size:18px}.summary-card span{color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase}.report-empty{color:var(--muted)}body.inspector-collapsed .layout{grid-template-columns:minmax(0,1fr)0}body.inspector-collapsed .inspector{transform:translateX(340px);overflow:visible}@media(max-width:900px){.topbar{min-height:58px}.topbar-main{min-height:58px;padding:10px 14px}.project-title{font-size:16px}.topbar-toggle{display:inline-grid;place-items:center;width:48px;height:48px;min-height:0;padding:0;font-size:24px}.topbar-drawer{display:grid;gap:10px;padding:0 14px 12px}.topbar-collapsed .topbar-drawer{display:none}.layout{top:var(--mobile-topbar-height,58px);display:block}.stage{position:absolute;inset:0}.inspector{position:absolute;left:0;right:0;bottom:0;height:min(44vh,380px);border-top:1px solid var(--line);border-left:0;box-shadow:0 -12px 32px rgba(0,0,0,.26);transform:translateY(0);overflow:auto}.inspector-head{padding:18px 20px 10px}.inspector h1{font-size:19px}.placeholder{padding:0 20px 22px;font-size:18px}.inspector-toggle{top:-42px;left:50%;transform:translateX(-50%);width:72px;height:44px;border:1px solid var(--line-strong);border-bottom:0;border-radius:16px 16px 0 0;background:var(--panel);font-size:24px}.inspector-collapsed .inspector{transform:translateY(calc(100% - 1px));overflow:visible}.inspector-collapsed .inspector-head,.inspector-collapsed #inspect{visibility:hidden}.inspector-collapsed .inspector-toggle{visibility:visible}.legend{padding-bottom:2px}.status{font-size:12px}.toolbar{gap:7px}.tool-button{min-height:40px}}`;
    }

    function repairHostedViewerHtml(html) {
      const value = String(html || "");
      if (!value.trim()) return value;
      if (/<style>\s*<\/style>/.test(value)) {
        return value.replace(/<style>\s*<\/style>/, `<style>${hostedViewerCss()}</style>`);
      }
      return value;
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      if (!projectId) return;
      const password = passwordInput.value;
      if (!password) {
        setStatus("Enter the project password.", "error");
        return;
      }
      button.disabled = true;
      button.textContent = "Opening...";
      setStatus("Checking password...");
      try {
        const response = await fetch("/api/project", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: projectId, password })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || "Could not open this project.");
        if (!result.html) throw new Error("The hosted viewer file is missing.");
        setStatus("Opening viewer...", "success");
        const frame = document.createElement("iframe");
        frame.setAttribute("title", result.projectName || result.title || "AV Designer Viewer");
        frame.setAttribute("loading", "eager");
        frame.style.position = "fixed";
        frame.style.inset = "0";
        frame.style.width = "100%";
        frame.style.height = "100%";
        frame.style.border = "0";
        frame.style.background = "#11161b";
        document.body.innerHTML = "";
        document.body.style.padding = "0";
        document.body.style.display = "block";
        document.body.appendChild(frame);
        frame.srcdoc = repairHostedViewerHtml(result.html);
      } catch (error) {
        setStatus(error.message || "The viewer could not be opened.", "error");
        button.disabled = false;
        button.textContent = "Open Viewer";
      }
    });
  </script>
</body>
</html>
