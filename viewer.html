<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AV Designer Viewer</title>
  <link rel="icon" href="VideoCoreLogo.png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #11161b;
      --panel: #20262d;
      --line: #33404d;
      --text: #edf2f7;
      --muted: #a7b2c1;
      --blue: #32b6ff;
      --orange: #fb7904;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .viewer-card {
      width: min(460px, 100%);
      display: grid;
      gap: 16px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .32);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #111820;
      color: var(--text);
      font: inherit;
      font-weight: 700;
    }

    input:focus {
      border-color: var(--blue);
      outline: 2px solid rgba(50, 182, 255, .18);
    }

    button {
      min-height: 42px;
      border: 1px solid var(--blue);
      border-radius: 7px;
      background: var(--blue);
      color: #061018;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: .72;
    }

    .status {
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--blue);
    }
  </style>
</head>
<body>
  <main class="viewer-card">
    <div class="brand">
      <img src="VideoCoreLogo.png" alt="Video Core">
      <div>
        <h1>AV Designer Viewer</h1>
        <p>Read-only hosted wirechart</p>
      </div>
    </div>
    <p>Enter the project password to open the technician viewer.</p>
    <form id="unlockForm">
      <label>
        Viewer Password
        <input id="projectPassword" type="password" autocomplete="current-password" required>
      </label>
      <div class="status" id="viewerStatus"></div>
      <button id="unlockButton" type="submit">Open Viewer</button>
    </form>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const projectId = params.get("id") || "";
    const form = document.getElementById("unlockForm");
    const passwordInput = document.getElementById("projectPassword");
    const statusEl = document.getElementById("viewerStatus");
    const button = document.getElementById("unlockButton");

    function setStatus(message, mode = "") {
      statusEl.textContent = message || "";
      statusEl.className = "status" + (mode ? " " + mode : "");
    }

    if (!projectId) {
      setStatus("This viewer link is missing a project id.", "error");
      passwordInput.disabled = true;
      button.disabled = true;
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      if (!projectId) return;
      const password = passwordInput.value;
      if (!password) {
        setStatus("Enter the project password.", "error");
        return;
      }
      button.disabled = true;
      button.textContent = "Opening...";
      setStatus("Checking password...");
      try {
        const response = await fetch("/api/project", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: projectId, password })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || "Could not open this project.");
        if (!result.html) throw new Error("The hosted viewer file is missing.");
        setStatus("Opening viewer...", "success");
        document.open();
        document.write(result.html);
        document.close();
      } catch (error) {
        setStatus(error.message || "The viewer could not be opened.", "error");
        button.disabled = false;
        button.textContent = "Open Viewer";
      }
    });
  </script>
</body>
</html>
